{% extends "base.html" %}
{% block title %}Log in — Sanctum{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="wrap-narrow">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <div class="sub">Log in to continue screening.</div>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autofocus value="{{ email or '' }}">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div style="text-align:right; margin-bottom:18px; margin-top:-8px;">
          <a href="{{ url_for('auth.forgot_password') }}" style="font-size:13px; color:var(--text-faint);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
      </form>
      <div class="auth-switch">No account yet? <a href="{{ url_for('auth.signup') }}">Create one free</a></div>
    </div>
  </div>
</div>
{% endblock %}
