{% extends "base.html" %}
{% block title %}Set a new password — Sanctum{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="wrap-narrow">
    <div class="auth-card">
      <h1>Set a new password</h1>
      <div class="sub">This link expires 30 minutes after it was requested.</div>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" required minlength="8" autofocus placeholder="At least 8 characters">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Update password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
